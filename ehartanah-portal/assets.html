<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengurusan Aset – e-Hartanah Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:({opacityValue:o})=>o!=null?`rgba(var(--color-primary),${o})`:`rgb(var(--color-primary))`,secondary:({opacityValue:o})=>o!=null?`rgba(var(--color-secondary),${o})`:`rgb(var(--color-secondary))`},fontFamily:{sans:["'Space Grotesk'","system-ui","sans-serif"]}}}}</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 font-sans">

<div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden"></div>

<div class="flex h-screen overflow-hidden">
  <aside id="sidebar"
    class="fixed inset-y-0 left-0 z-50 w-64 flex flex-col
           -translate-x-full transition-transform duration-300
           lg:relative lg:translate-x-0 lg:z-auto flex-shrink-0"></aside>

  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header id="topbar"
      class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 flex-shrink-0 gap-4"></header>

    <main class="flex-1 overflow-y-auto bg-gray-50">
      <div class="p-4 lg:p-6 max-w-screen-2xl mx-auto space-y-5">

        <!-- ── Summary Cards ────────────────────────────── -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
          <div class="stat-card">
            <div class="stat-icon bg-blue-100"><svg class="w-6 h-6 text-blue-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21"/></svg></div>
            <div><p class="stat-label">Jumlah Aset</p><p id="asset-total" class="stat-value">–</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon bg-emerald-100"><svg class="w-6 h-6 text-emerald-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></div>
            <div><p class="stat-label">Aset Aktif</p><p id="asset-active" class="stat-value">–</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon bg-amber-100"><svg class="w-6 h-6 text-amber-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877"/></svg></div>
            <div><p class="stat-label">Penyelenggaraan</p><p id="asset-maintenance" class="stat-value">–</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon bg-teal-100"><svg class="w-6 h-6 text-teal-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/></svg></div>
            <div><p class="stat-label">Tanah Simpan</p><p id="asset-land" class="stat-value">–</p></div>
          </div>
          <div class="stat-card col-span-2 lg:col-span-1">
            <div class="stat-icon bg-purple-100"><svg class="w-6 h-6 text-purple-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></div>
            <div><p class="stat-label">Nilai Keseluruhan</p><p id="asset-total-value" class="stat-value text-base">–</p></div>
          </div>
        </div>

        <!-- ── Filter Panel ──────────────────────────────── -->
        <div class="section-card">
          <div class="section-header">
            <h3 class="section-title">Carian &amp; Penapis</h3>
            <button onclick="clearFilters()" class="btn btn-secondary btn-sm">
              <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
              Tetapkan Semula
            </button>
          </div>
          <div class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <div>
              <label class="form-label">Cari Aset</label>
              <input id="search-asset" type="text" class="form-input" placeholder="ID, nama, lokasi...">
            </div>
            <div>
              <label class="form-label">Jenis Aset</label>
              <select id="filter-type" class="form-input">
                <option value="">Semua Jenis</option>
                <option>Bangunan Kerajaan</option>
                <option>Tanah Simpan</option>
                <option>Kuarters Kerajaan</option>
                <option>Kemudahan Awam</option>
                <option>Gudang</option>
              </select>
            </div>
            <div>
              <label class="form-label">Negeri</label>
              <select id="filter-state" class="form-input">
                <option value="">Semua Negeri</option>
                <option>WP Kuala Lumpur</option>
                <option>WP Putrajaya</option>
                <option>Selangor</option>
                <option>Perak</option>
                <option>Pahang</option>
                <option>Johor</option>
                <option>Pulau Pinang</option>
                <option>Kelantan</option>
                <option>Sabah</option>
                <option>Sarawak</option>
              </select>
            </div>
            <div>
              <label class="form-label">Status</label>
              <select id="filter-status" class="form-input">
                <option value="">Semua Status</option>
                <option>Aktif</option>
                <option>Penyelenggaraan</option>
                <option>Tidak Aktif</option>
                <option>Pelupusan</option>
              </select>
            </div>
          </div>
        </div>

        <!-- ── Asset Table ───────────────────────────────── -->
        <div class="section-card">
          <div class="section-header">
            <div>
              <h3 class="section-title">Senarai Aset</h3>
              <p id="asset-count" class="text-xs text-slate-400 mt-0.5">–</p>
            </div>
            <div class="flex gap-2 flex-wrap">
              <button onclick="exportCSV()" class="btn btn-secondary btn-sm">
                <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                Export CSV
              </button>
              <button onclick="exportPDF()" class="btn btn-secondary btn-sm">
                <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
                Export PDF
              </button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID Aset</th>
                  <th>Nama Aset</th>
                  <th>Jenis Aset</th>
                  <th>Pemilikan</th>
                  <th>Lokasi</th>
                  <th>Sumber Dana</th>
                  <th>Nilai Pasaran</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="assets-tbody">
                <tr><td colspan="8" class="py-12 text-center text-slate-400">Memuatkan data...</td></tr>
              </tbody>
            </table>
          </div>
          <!-- Pagination -->
          <div id="pagination" class="flex items-center justify-center gap-2 px-4 py-4 border-t border-slate-100 flex-wrap"></div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="mock-data/data.js"></script>
<script src="js/nav.js"></script>
<script>ehPortal.init({ page: 'assets', title: 'Pengurusan Aset' });</script>
<script src="js/assets.js"></script>
</body>
</html>
