<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Masuk – e-Hartanah Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
      background: #eef2f7;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    /* ── Logo block ── */
    .login-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #1a2744;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo-icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    .login-app-name {
      font-size: 26px;
      font-weight: 800;
      color: #1a2744;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .login-app-sub {
      font-size: 14px;
      color: #64748b;
      margin: 0;
    }

    /* ── Card ── */
    .login-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }

    .login-card-header {
      padding: 22px 28px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }
    .login-card-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a2744;
      margin: 0;
    }

    .login-card-body {
      padding: 24px 28px;
    }

    /* ── Form ── */
    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1a2744;
      margin-bottom: 8px;
    }
    .field-label .req {
      color: #e53e3e;
      margin-left: 2px;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d9e0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a2744;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .field-input::placeholder { color: #a0aec0; }
    .field-input:focus {
      border-color: #1a2744;
      box-shadow: 0 0 0 3px rgba(26, 39, 68, 0.1);
    }

    .field-wrap { margin-bottom: 18px; }

    .btn-masuk {
      width: 100%;
      padding: 14px;
      background: #1a2744;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, opacity 0.2s;
      font-family: inherit;
      margin-top: 6px;
    }
    .btn-masuk:hover { background: #0f172a; }
    .btn-masuk:disabled { opacity: 0.65; cursor: not-allowed; }

    /* ── Error ── */
    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      font-size: 13px;
      color: #c53030;
      margin-bottom: 14px;
    }
    .error-box.show { display: flex; }

    /* ── Card footer ── */
    .login-card-footer {
      padding: 18px 28px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }
    .login-card-footer p {
      font-size: 12px;
      color: #94a3b8;
      margin: 0;
      line-height: 1.6;
    }

    /* ── Page footer ── */
    .page-footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo-wrap">
      <div class="login-logo-icon">
        <!-- Shield icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
        </svg>
      </div>
      <p class="login-app-name">e-Hartanah</p>
      <p class="login-app-sub">Jabatan Ketua Pengarah Tanah &amp; Galian Persekutuan</p>
    </div>

    <!-- Card -->
    <div class="login-card">

      <div class="login-card-header">
        <h2>Log Masuk</h2>
      </div>

      <div class="login-card-body">

        <div id="login-error" class="error-box">
          <svg style="width:15px;height:15px;flex-shrink:0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
          </svg>
          Sila lengkapkan semua medan termasuk peranan.
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="field-wrap">
            <label class="field-label" for="username">Nama Pengguna <span class="req">*</span></label>
            <input id="username" type="text" class="field-input" placeholder="Contoh: Ahmad.Razali"
              autocomplete="username" value="Ahmad.Razali">
          </div>

          <div class="field-wrap">
            <label class="field-label" for="password">Kata Laluan <span class="req">*</span></label>
            <div style="position:relative">
              <input id="password" type="password" class="field-input" placeholder="••••••••"
                style="padding-right:42px" autocomplete="current-password" value="demo1234">
              <button type="button" onclick="togglePassword()"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a0aec0;padding:0;transition:color 0.15s"
                onmouseover="this.style.color='#64748b'" onmouseout="this.style.color='#a0aec0'">
                <svg id="eye-icon" style="width:16px;height:16px" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="field-wrap">
            <label class="field-label" for="role">Peranan / Unit <span class="req">*</span></label>
            <select id="role" class="field-input">
              <option value="">-- Pilih Peranan --</option>
              <option value="Unit Tanah">Unit Tanah</option>
              <option value="Unit Kemudahan">Unit Kemudahan</option>
              <option value="Unit Pajakan">Unit Pajakan</option>
              <option value="Kewangan">Kewangan</option>
              <option value="Undang-undang">Undang-undang</option>
              <option value="Admin">Admin</option>
              <option value="Pengurusan">Pengurusan</option>
            </select>
          </div>

          <button type="submit" id="login-btn" class="btn-masuk">Log Masuk</button>
        </form>
      </div>

      <div class="login-card-footer">
        <p>POC — Kata laluan sebarang nilai diterima</p>
      </div>

    </div>

    <p class="page-footer">© 2024 Jabatan Ketua Pengarah Tanah &amp; Galian Persekutuan</p>
  </div>

  <script>
    if (localStorage.getItem('ehUser')) window.location.replace('dashboard.html');

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      if (!username || !password || !role) { errEl.classList.add('show'); return; }
      errEl.classList.remove('show');

      btn.disabled = true;
      btn.innerHTML = `<svg style="width:16px;height:16px;animation:spin 1s linear infinite;vertical-align:middle;margin-right:6px" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle style="opacity:.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path style="opacity:.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Mengesahkan...`;

      setTimeout(() => {
        localStorage.setItem('ehUser', JSON.stringify({ name: username, role, loginTime: new Date().toISOString(), sessionId: Math.random().toString(36).slice(2,10).toUpperCase() }));
        window.location.replace('dashboard.html');
      }, 900);
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
